{% extends 'base.html' %}
{% block content %}
<title>{% block title %}Создание курса{% endblock %}</title>
  <style>
    :root {
      --bg: #f6f7fb;
      --card: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --primary: #4f46e5;
      --success: #10b981;
      --danger: #ef4444;
      --border: #e5e7eb;
    }
    main {
      max-width: 900px;
      margin: 40px auto;
      padding: 0 16px;
    }
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 20px;
      box-shadow: 0 2px 6px rgba(0,0,0,.05);
    }
    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }
    .field {
      display: flex;
      flex-direction: column;
    }
    label {
      font-size: 0.9rem;
      color: var(--muted);
      margin-bottom: 6px;
    }
    input[type="text"],
    input[type="number"],
    textarea,
    select {
      padding: 10px 12px;
      border: 1px solid var(--border);
      border-radius: 6px;
      font-size: 1rem;
      background: #fff;
    }
    textarea { min-height: 120px; resize: vertical; }
    .actions {
      display: flex;
      gap: 10px;
      justify-content: flex-end;
      margin-top: 14px;
    }
    button {
      padding: 10px 14px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }
    .btn-secondary {
      background: #e5e7eb;
      color: #111;
    }
    .btn-primary {
      background: var(--primary);
      color: #fff;
    }
    .hint { font-size: 0.85rem; color: var(--muted); }
    .error { color: var(--danger); font-size: 0.85rem; }
    @media (max-width: 768px) {
      .grid { grid-template-columns: 1fr; }
    }
  </style>
<body>

  <main>
    <section class="card" aria-labelledby="create-course-title">
      <h1 id="create-course-title">Создать курс</h1>
      <form id="courseForm" method="post">
        {% csrf_token %}
        <div class="grid">
          <div class="field">
            <label for="title">Название курса</label>
            {{form.title}}
            <span class="hint">Будет отображаться на карточке курса.</span>
          </div>

          <div class="field">
            <label for="category">Категория</label>
            <select id="category" name="category" required>
              <option value="">Выберите категорию</option>
              <option value="programming">Программирование</option>
              <option value="design">Дизайн</option>
              <option value="marketing">Маркетинг</option>
              <option value="finance">Финансы</option>
              <option value="photography">Фотография</option>
            </select>
          </div>
        </div>

        <div class="grid" style="margin-top: 14px;">
          <div class="field">
            <label for="duration">Длительность (часов)</label>
            <input type="number" id="duration" name="duration" min="1" placeholder="Например, 5" required />
          </div>

          <div class="field">
            <label for="level">Уровень</label>
            <select id="level" name="level" required>
              <option value="">Выберите уровень</option>
              <option value="beginner">Начальный</option>
              <option value="intermediate">Средний</option>
              <option value="advanced">Продвинутый</option>
            </select>
          </div>
        </div>

        <div class="field" style="margin-top: 14px;">
          <label for="description">Краткое описание</label>
          {{form.description}}
        </div>

        <div class="field" style="margin-top: 14px;">
          <label for="thumbnail">Ссылка на обложку (опционально)</label>
          <input type="text" id="thumbnail" name="thumbnail" placeholder="https://..." />
        </div>

        <div class="error" id="formError" aria-live="polite" style="display:none; margin-top:8px;"></div>

        <div class="actions">
          <button type="button" class="btn-secondary" id="cancelBtn">Отмена</button>
          <button type="submit" class="btn-primary" id="saveBtn">Сохранить курс</button>
        </div>
      </form>
    </section>
  </main>
</body>

{% endblock %}
