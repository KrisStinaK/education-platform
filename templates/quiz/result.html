{% extends "base.html" %}
{% load static %}
{% block content %}
<div class="container mt-4 text-center">
    <h1 class="mb-4">Результат теста</h1>
    <div class="alert alert-info">
        Вы правильно ответили {{ score }} из {{ total }} вопросов.
    </div>
    <a href="." class="btn btn-secondary">Пройти заново</a>
    <a href="{% url 'quizzes:results_history' %}" class="btn btn-primary ml-2">Моя история</a>
</div>
<script src="{% static 'js/bootstrap.bundle.min.js' %}"></script>
{% endblock %}
