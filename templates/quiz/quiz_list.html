{% extends 'base.html' %}
{% block content %}
 <style>
    :root {
      --bg: #f6f7fb;
      --card: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --primary: #1e88e5;
      --border: #e5e7eb;
      --shadow: 0 4px 12px rgba(0,0,0,.05);
    }
    * { box-sizing: border-box; }
    h1 {
      font-size: 35px;
      margin: 0;
    }

    .btn {
      border: 1px solid var(--border);
      background: #fff;
      padding: 8px 12px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.95rem;
    }

    .btn.primary {
      background: var(--primary);
      color: #fff;
      border-color: var(--primary);
    }
    .actions {
      display: flex;
      margin-bottom: 10px;
      gap: 8px;
    }

    .search {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      border: 1px solid var(--border);
      border-radius: 999px;
      background: #fff;
      width: 100%;
      max-width: 420px;
    }

    .search input {
      border: none;
      outline: none;
      width: 100%;
      font-size: 1rem;
    }

    .list {
      list-style: none;
      padding: 0;
      margin: 0;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 12px;
    }

    .chat-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: #fff;
      cursor: pointer;
      transition: transform .08s ease, background .2s ease;
      position: relative;
      min-height: 72px;
      box-shadow: var(--shadow);
    }
    .chat-item:hover { background: #f9fbfe; }
    /* Медиазапросы для мобильной версий */
    @media (max-width: 600px) {
      .container { padding: 12px; }
      .list { grid-template-columns: 1fr; }
      .chat-item { min-height: 64px; }
    }
  </style>
</head>
<body>
  <div class="container">
      <h1>Тесты</h1>

    <!-- Поиск -->
        <form method="get" class="mb-4">
            <div class="input-group">
                <input type="text" name="q" class="form-control" 
                       placeholder="Поиск тестов..." value="{{ query|default:'' }}">
                <button class="btn btn-dark" style="background: #00E5D2;" type="submit">Найти</button>
            </div>
        </form>
      <div class="actions">
          <a href="#" class="btn" id="newChatBtn" title="Создать тест">Создать тест</a>
          <button class="btn" id="settingsBtn" title="Настройки">Настройки</button>
      </div>

    <ul class="list" id="chatList" aria-label="Список чатов">
      <!-- Пример элемента чата -->
       {% for quiz in quizes %}
      <li class="chat-item" data-chat-id="1" tabindex="0">
        <div class="chat-info">
          <div class="chat-title"><a href="{% url 'quizzes:quiz_detail' quiz.id %}">
                        <h5><b>{{ quiz.title }}</b>-{{quiz.lesson}}</h5></a></div>
        </div>
        <!-- <span class="unread" aria-label="Непрочитанные сообщения">2</span> -->
      </li>
      {% endfor %}

      <!-- Конец примеров -->
    </ul>
  </div>

{% endblock %}
